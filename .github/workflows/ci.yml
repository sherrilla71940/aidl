name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build

  validate-workspace-agents:
    name: Validate workspace agent frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check agent frontmatter
        run: |
          set -euo pipefail
          failed=0
          for f in .github/agents/*.agent.md; do
            echo "Checking $f ..."
            if ! awk '/^---/{n++; next} n==1' "$f" | grep -q "^description:"; then
              echo "FAIL: $f is missing 'description' in frontmatter"
              failed=1
            fi
            if ! awk '/^---/{n++; next} n==1' "$f" | grep -q "^tools:"; then
              echo "FAIL: $f is missing 'tools' in frontmatter"
              failed=1
            fi
          done
          exit $failed

  validate-slash-commands:
    name: Validate slash command frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check prompt frontmatter
        run: |
          set -euo pipefail
          failed=0
          for f in .github/prompts/*.prompt.md; do
            echo "Checking $f ..."
            if ! awk '/^---/{n++; next} n==1' "$f" | grep -q "^description:"; then
              echo "FAIL: $f is missing 'description' in frontmatter"
              failed=1
            fi
            if ! awk '/^---/{n++; next} n==1' "$f" | grep -q "^agent:"; then
              echo "FAIL: $f is missing 'agent:' in frontmatter"
              failed=1
            fi
          done
          exit $failed

  no-personal-content:
    name: Ensure no personal config in PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for sync/ or local/ changes
        run: |
          set -euo pipefail
          # List files changed between PR branch and main
          changed=$(git diff --name-only origin/main...HEAD | grep -E '^(sync|local)/' | grep -v '\.gitkeep$' || true)
          if [[ -n "$changed" ]]; then
            echo "FAIL: PR includes changes to sync/ or local/ (personal config):"
            echo "$changed"
            echo ""
            echo "PRs to upstream must only touch src/, .github/, or docs/."
            echo "Keep personal config in your own fork — do not PR it upstream."
            exit 1
          fi

  translation-parity:
    name: Check zh-TW translation parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for missing or stale translations
        run: |
          set -euo pipefail
          failed=0

          # Collect English .md files in root and docs/ (exclude zh-TW files themselves)
          sources=()
          for f in *.md docs/*.md; do
            [[ -f "$f" ]] || continue
            [[ "$f" == *.zh-TW.md ]] && continue
            [[ "$f" == docs/TODO.md ]] && continue
            [[ "$f" == LICENSE ]] && continue
            sources+=("$f")
          done

          for src in "${sources[@]}"; do
            # Derive expected zh-TW counterpart
            zhtw="${src%.md}.zh-TW.md"
            if [[ ! -f "$zhtw" ]]; then
              echo "FAIL: $zhtw does not exist (translation of $src)"
              failed=1
            else
              # Check if source is newer than translation (by last commit date)
              src_date=$(git log -1 --format=%ct -- "$src" 2>/dev/null || echo 0)
              zhtw_date=$(git log -1 --format=%ct -- "$zhtw" 2>/dev/null || echo 0)
              if [[ "$src_date" -gt "$zhtw_date" ]]; then
                echo "WARN: $zhtw may be stale (source $src was updated more recently)"
                failed=1
              fi
            fi
          done

          if [[ $failed -ne 0 ]]; then
            echo ""
            echo "Run 'cam translate <file>' or use the translate skill in Copilot Chat to fix."
            exit 1
          fi
          echo "All translations are up to date."
