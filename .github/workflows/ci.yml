name: CI

on:
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: Lint sync.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck scripts/sync.sh

  psscriptanalyzer:
    name: Lint sync.ps1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path scripts/sync.ps1 -Severity Error,Warning
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }

  validate-workspace-agents:
    name: Validate workspace agent frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check agent frontmatter
        run: |
          set -euo pipefail
          failed=0
          for f in .github/agents/*.agent.md; do
            echo "Checking $f ..."
            if ! awk '/^---/{n++; next} n==1' "$f" | grep -q "^description:"; then
              echo "FAIL: $f is missing 'description' in frontmatter"
              failed=1
            fi
            if ! awk '/^---/{n++; next} n==1' "$f" | grep -q "^tags:"; then
              echo "FAIL: $f is missing 'tags' in frontmatter"
              failed=1
            fi
            if ! awk '/^---/{n++; next} n==1' "$f" | grep -q "^type:"; then
              echo "FAIL: $f is missing 'type' in frontmatter"
              failed=1
            fi
          done
          exit $failed

  validate-slash-commands:
    name: Validate slash command frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check prompt frontmatter
        run: |
          set -euo pipefail
          failed=0
          for f in .github/prompts/*.prompt.md; do
            echo "Checking $f ..."
            if ! awk '/^---/{n++; next} n==1' "$f" | grep -q "^description:"; then
              echo "FAIL: $f is missing 'description' in frontmatter"
              failed=1
            fi
            if ! awk '/^---/{n++; next} n==1' "$f" | grep -q "^mode: agent"; then
              echo "FAIL: $f is missing 'mode: agent' in frontmatter"
              failed=1
            fi
          done
          exit $failed

  no-personal-content:
    name: Ensure no personal config in PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for sync/ or local/ changes
        run: |
          set -euo pipefail
          # List files changed between PR branch and main
          changed=$(git diff --name-only origin/main...HEAD | grep -E '^(sync|local)/' | grep -v '\.gitkeep$' || true)
          if [[ -n "$changed" ]]; then
            echo "FAIL: PR includes changes to sync/ or local/ (personal config):"
            echo "$changed"
            echo ""
            echo "PRs to upstream must only touch scripts/, .github/, or docs/."
            echo "Keep personal config in your own fork — do not PR it upstream."
            exit 1
          fi
